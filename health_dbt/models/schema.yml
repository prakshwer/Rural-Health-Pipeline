version: 2

models:
  - name: stg_patients
    description: Cleaned and validated patient records
    columns:
      - name: patient_id
        tests: [not_null]
      - name: age
        tests: [not_null]
      - name: village
        tests: [not_null]
      - name: diagnosis
        tests: [not_null]

  - name: fct_village_health
    description: Village level health summary
    columns:
      - name: village
        tests: [not_null, unique]

  - name: fct_worker_performance
    description: Health worker performance metrics
    columns:
      - name: health_worker_id
        tests: [not_null]

  - name: fct_disease_trends
    description: Disease trends by village and month
    columns:
      - name: diagnosis
        tests: [not_null]